<div id="favoritas">
  <h1>Mis recetas favoritas</h1>

  @if (recetas_favoritas.length > 0) {
    <div class="contenedorRecetas">
      @for (receta of recetas_favoritas; track receta._id) {
        <div class="cardReceta">
          <img [src]="receta.img" [alt]="receta.nombre">
          <h3>{{ receta.nombre }}</h3>
          <p><strong>{{ receta.puntuacion }}</strong> <i class="fas fa-star star"></i></p>
          <button [routerLink]="['/recetas', receta._id]">Ver receta</button>
          <button class="btn-eliminar" (click)="eliminarFavorita(receta._id)">🗑️ Eliminar</button>
        </div>
      }
    </div>
  } @else {
    <div class="noExiste">
      <p>No tienes recetas favoritas guardadas aún.</p>
      <a routerLink="/recetas">Explorar recetas</a>
    </div>
  }
</div>
