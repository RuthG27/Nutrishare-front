<h1>Rellena el formulario</h1>

<div class="contenedor-form">

  <form [formGroup]="form" (ngSubmit)="guardar()" class="form-receta">

    <div class="contenedor">

      <label>Nombre</label>
      <input type="text" formControlName="nombre" />
      <small *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
      El nombre es obligatorio
      </small>

    </div>

    <div class="contenedor">

      <label>Cocina</label>
      <select formControlName="cocina">
        <option value="">Selecciona una cocina</option>
        <option value="Griega">Griega</option>
        <option value="Italiana">Italiana</option>
        <option value="Mediterránea">Mediterránea</option>
        <option value="Francesa">Francesa</option>
        <option value="Española">Española</option>
        <option value="Magrebí">Magrebí</option>
        <option value="Libanesa">Libanesa</option>
        <option value="Marroquí">Marroquí</option>
        <option value="Vasca">Vasca</option>
        <option value="Catalana">Catalana</option>
      </select>

    </div>
  
    <div class="contenedor">
      <label>Categoría</label>
      <select formControlName="categoria">
        <option value="">Selecciona categoría</option>
        <option value="Ensalada">Ensalada</option>
        <option value="Aperitivo">Aperitivo</option>
        <option value="Pasta">Pasta</option>
        <option value="Plato único">Plato único</option>
        <option value="Salsa / snack">Salsa / snack</option>
        <option value="Guarnición">Guarnición</option>
        <option value="Sopa fría">Sopa fría</option>
        <option value="Sopa caliente">Sopa caliente</option>
        <option value="Cereal">Cereal</option>
        <option value="Segundo">Segundo</option>
        <option value="Arroz">Arroz</option>
        <option value="Huevos">Huevos</option>
        <option value="Verdura salteada">Verdura salteada</option>
        <option value="Dip">Dip</option>
        <option value="Legumbre">Legumbre</option>
        <option value="Pescado">Pescado</option>
        <option value="Carne">Carne</option>
        <option value="Verdura rellena">Verdura rellena</option>
        <option value="Desayuno">Desayuno</option>
        <option value="Horno">Horno</option>
      </select>

    </div>

    <div class="contenedor">
      <label>Dificultad</label>
      <select formControlName="dificultad">
        <option value="">Selecciona dificultad</option>
        <option value="Fácil">Fácil</option>
        <option value="Media">Media</option>
      </select>

    </div>

    <div class="contenedor">

      <label>Tiempo de preparación (min)</label>
      <input type="number" formControlName="tiempo_preparacion" />

    </div>

    <div class="contenedor">

        <label>Pasos</label>
        <textarea formControlName="pasos"></textarea>

    </div>

    <div class="contenedor">
      <label>Ingredientes</label>

      <div class="lista-ingredientes">
        <div *ngFor="let producto of productos" class="ingrediente-item">
          <input
            type="checkbox"
            [value]="producto._id"
            (change)="onIngredienteChange($event)"
            [checked]="form.value.ingredientes?.includes(producto._id)"
          />
          <span>{{ producto.nombre }}</span>
        </div>
      </div>
    </div>

    <div class="contenedor">

      <label>Nutrientes totales</label>
      <input type="number" formControlName="nutrientes_totales" />

    </div>

    <div class="contenedor">

      <label>Imagen (URL)</label>
      <input type="text" formControlName="img" />

    </div>

    <div class="contenedor">
      <label>Puntuación (0–5)</label>
      <input type="number" formControlName="puntuacion" min="0" max="5" step="0.1" />

    </div>

    
      <button type="submit" [disabled]="form.invalid" class="btn-borrar">
        {{ esEdicion ? 'Guardar cambios' : 'Crear receta' }}
      </button>
      
      <button type="button" class="btn-cancelar" (click)="cerrar()">
        Cerrar formulario
      </button>

  </form>

</div>
